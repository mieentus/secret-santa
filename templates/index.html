<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Santa 🎅</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: #d32f2f;
            text-align: center;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }
        .participant-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-add { background-color: #e0e0e0; color: #333; width: 100%; margin-bottom: 20px; }
        .btn-add:hover { background-color: #d0d0d0; }
        
        .btn-remove { background-color: #ffcdd2; color: #c62828; }
        .btn-remove:hover { background-color: #ef9a9a; }
        
        .btn-submit { background-color: #388e3c; color: white; width: 100%; font-size: 16px; padding: 15px; }
        .btn-submit:hover { background-color: #2e7d32; }
        
        #status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .success { background-color: #c8e6c9; color: #2e7d32; }
        .error { background-color: #ffcdd2; color: #c62828; }
        .loading { background-color: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Secret Santa 🎅</h1>
    <p class="subtitle">Dodaj uczestników</p>

    <div id="participants-list">
        <div class="participant-row">
            <input type="text" placeholder="Imię" class="p-name" required>
            <input type="email" placeholder="Adres E-mail" class="p-email" required>
            <button class="btn-remove" onclick="removeRow(this)">X</button>
        </div>
        <div class="participant-row">
            <input type="text" placeholder="Imię" class="p-name" required>
            <input type="email" placeholder="Adres E-mail" class="p-email" required>
            <button class="btn-remove" onclick="removeRow(this)">X</button>
        </div>
        <div class="participant-row">
            <input type="text" placeholder="Imię" class="p-name" required>
            <input type="email" placeholder="Adres E-mail" class="p-email" required>
            <button class="btn-remove" onclick="removeRow(this)">X</button>
        </div>
    </div>

    <button class="btn-add" onclick="addRow()">+ Dodaj kolejną osobę</button>
    <button class="btn-submit" onclick="drawAndSend()">Losuj i wyślij maile!</button>

    <div id="status-message"></div>
</div>

<script>
    function addRow() {
        const list = document.getElementById('participants-list');
        const row = document.createElement('div');
        row.className = 'participant-row';
        row.innerHTML = `
            <input type="text" placeholder="Imię" class="p-name" required>
            <input type="email" placeholder="Adres E-mail" class="p-email" required>
            <button class="btn-remove" onclick="removeRow(this)">X</button>
        `;
        list.appendChild(row);
    }

    function removeRow(btn) {
        const row = btn.parentElement;
        row.remove();
    }

    function showStatus(text, type) {
        const statusDiv = document.getElementById('status-message');
        statusDiv.style.display = 'block';
        statusDiv.className = type;
        statusDiv.innerText = text;
    }

    async function drawAndSend() {
        const rows = document.querySelectorAll('.participant-row');
        const participants = {};
        
        for (let row of rows) {
            const name = row.querySelector('.p-name').value.trim();
            const email = row.querySelector('.p-email').value.trim();
            
            if (!name || !email) {
                showStatus('Proszę wypełnić wszystkie pola!', 'error');
                return;
            }
            participants[name] = email;
        }

        if (Object.keys(participants).length < 3) {
            showStatus('Potrzeba minimum 3 uczestników do losowania.', 'error');
            return;
        }

        showStatus('Trwa losowanie i wysyłanie wiadomości...', 'loading');

        try {
            const response = await fetch('/api/draw', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(participants)
            });

            const result = await response.json();

            if (response.ok) {
                showStatus(`Sukces! Wysłano ${result.emails_sent} e-maili.`, 'success');
            } else {
                showStatus(`Błąd: ${result.error || 'Coś poszło nie tak'}`, 'error');
            }
        } catch (error) {
            showStatus('Błąd połączenia z serwerem.', 'error');
        }
    }
</script>

</body>
</html>
